<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronômetro Esportivo</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <img src="logo.png" class="logo" alt="Logo">

        <div id="cronometro">00:00:00</div>

        <div class="rodada-info">
            Rodada <span id="rodadaAtual">1</span> de <span id="rodadaTotal">5</span>
        </div>

        <div class="botoes-principais">
            <button class="btn-icone btn-iniciar" onclick="iniciar()" aria-label="Iniciar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="6,4 20,12 6,20" fill="currentColor" stroke="none"/>
                </svg>
            </button>
            <button class="btn-icone btn-pausar" onclick="pausar()" aria-label="Pausar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="6" y="4" width="4" height="16" fill="currentColor" stroke="none"/>
                    <rect x="14" y="4" width="4" height="16" fill="currentColor" stroke="none"/>
                </svg>
            </button>
            <button class="btn-icone btn-zerar" onclick="zerar()" aria-label="Zerar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 3-6.7"/>
                    <polyline points="3 3 3 8 8 8"/>
                </svg>
            </button>
        </div>

    </div>

    <!-- Botão flutuante que abre o painel de configurações/controles -->
    <button class="menu-flutuante" id="botaoMenu" onclick="alternarMenu()" aria-label="Abrir menu">
        ☰
    </button>

    <!-- Fundo escurecido por trás do painel, fecha o menu ao clicar fora -->
    <div class="overlay-menu" id="overlayMenu" onclick="fecharMenu()"></div>

    <!-- Painel lateral com configurações e controles -->
    <div class="painel-menu" id="painelMenu">

        <div class="painel-cabecalho">
            <h2>Configurações</h2>
            <button class="botao-fechar" onclick="fecharMenu()" aria-label="Fechar menu">✕</button>
        </div>

        <div class="painel-secao">
            <label for="tempoLuta">Tempo de luta (predefinido):</label>
            <select id="tempoLuta">
                <option value="3">3 minutos</option>
                <option value="5">5 minutos</option>
                <option value="6">6 minutos</option>
                <option value="7">7 minutos</option>
                <option value="8">8 minutos</option>
                <option value="10">10 minutos</option>
                <option value="custom">Personalizado</option>
            </select>
        </div>

        <div class="painel-secao">
            <label for="tempoLutaCustom">Tempo de luta personalizado (minutos):</label>
            <input type="number" id="tempoLutaCustom" min="1" max="120" step="0.5" placeholder="Ex: 4">
        </div>

        <div class="painel-secao">
            <label for="tempoDescansoCustom">Tempo de descanso (minutos):</label>
            <input type="number" id="tempoDescansoCustom" min="0.1" max="30" step="0.5" value="1">
        </div>

        <div class="painel-secao">
            <label for="numRodadas">Número de rodadas:</label>
            <input type="number" id="numRodadas" value="5" min="1" max="50">
        </div>

        <button class="btn-alterar" id="botaoAlterar" onclick="aplicarAlteracao()">
            Alterar
        </button>

    </div>

<script src="script.js"></script>

</body>
</html>
